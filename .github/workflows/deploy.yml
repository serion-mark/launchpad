name: Deploy Foundry

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to NCP Server
        uses: appleboy/ssh-action@v1
        with:
          host: 175.45.200.162
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3181
          script: |
            cd /root/launchpad
            rm -rf api/dist
            git checkout -- .
            git pull origin main

            # Web 빌드 + 재시작
            cd web
            npm run build
            pm2 restart launchpad-web

            # API 재시작 (변경 있을 때만)
            cd ../api
            npm run build
            pm2 restart launchpad-api

            echo "Deploy complete: $(date)"
