name: Deploy Foundry

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to NCP Server
        uses: appleboy/ssh-action@v1
        with:
          host: 175.45.200.162
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3181
          script: |
            cd /root/launchpad
            rm -rf api/dist
            git checkout -- .
            git pull origin main

            # Web 빌드 + 재시작
            cd web
            npm run build
            pm2 restart launchpad-web

            # API 재시작 (변경 있을 때만)
            cd ../api
            npm run build
            pm2 restart launchpad-api

            # nginx timeout 설정 (AI 생성 5단계 파이프라인은 120초+ 소요)
            NGINX_CONF="/etc/nginx/conf.d/proxy-timeout.conf"
            cat > "$NGINX_CONF" << 'NGINX_EOF'
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            NGINX_EOF
            sed -i 's/^            //' "$NGINX_CONF"
            nginx -t && systemctl reload nginx && echo "nginx timeout conf applied"

            echo "Deploy complete: $(date)"
